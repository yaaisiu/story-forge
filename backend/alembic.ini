[alembic]
script_location = alembic
prepend_sys_path = ../src
path_separator = os
version_path_separator = os
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
# sqlalchemy.url is set in env.py from story_forge.config.settings.database_url
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Format new migrations with ruff (matches our backend formatter). ruff ships a
# standalone binary, not a console_scripts entry point, so use the exec hook and
# the `ruff` on PATH (present under `uv run alembic ...`).
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
