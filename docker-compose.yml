# Story Forge — local development infrastructure.
#
# Security posture (see spec §6.7):
#   - All published ports are bound to 127.0.0.1 only — no LAN exposure.
#   - All services run on a private bridge network; no `network_mode: host`.
#   - `no-new-privileges` is enforced on every container.
#   - Image tags are pinned to specific patches:
#       * neo4j:5.26.27-community-ubi10 — 5.26 is Neo4j's LTS line; patch .27
#         was published 2026-07-01, comfortably past the §6.7 7-day image soak
#         when pinned on 2026-07-23. Bumped from .25 to pick up netty
#         4.1.135.Final, which *fixes* the six netty CVEs .25 had to waive.
#         We pin the Red Hat UBI-10 variant over `-trixie`: Trivy shows the
#         Debian-13 base carrying 14 HIGH/CRITICAL OS-package CVEs (incl. 2
#         CRITICAL gnutls), while UBI-10 shows 0 — Red Hat ships the patched
#         packages. Residual HIGHs are all in jars Neo4j bundles itself (netty,
#         jetty, jackson, shiro) which no base variant or released tag can fix;
#         those are waived with justification in infra/trivy/neo4j.trivyignore.
#         (Issue #2.)
#       * pgvector/pgvector:0.8.2-pg17-trixie — CVE-fix release over 0.8.1;
#         all pgvector tags were rebuilt 2026-05-15 (6 days old at pin time, a
#         §6.7 age-bend taken by explicit decision for a CVE-fix release — see
#         Issue #4). trixie (Debian 13.4) is the cleanest base pgvector ships
#         (9 OS CVEs vs bookworm's 13; no UBI variant exists). Residual OS CVEs
#         and the bundled gosu/Go-stdlib CVEs are waived with per-CVE RCE
#         justification in infra/trivy/pgvector.trivyignore.
#       * ollama/ollama:0.24.0 (consumed via the wrapper in infra/ollama/) —
#         built 2026-05-14, 7 days old at pin time. Bumped from 0.22.1, which
#         went CVE-stale; residual compiled-in Go-stdlib CVEs (no tag fixes
#         them) are waived in infra/trivy/ollama.trivyignore. (Issue #4.)
#     The actual freshness/CVE check is performed by Trivy in CI.
#   - Postgres and Neo4j official images drop to non-root for the server
#     process internally. Ollama's upstream image runs as root, so we wrap it
#     in infra/ollama/Dockerfile to run as UID 10001.

name: story-forge

networks:
  storyforge_net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  ollama_models:

services:
  # -------------------------------------------------------------------------
  # Neo4j Community — knowledge graph
  # -------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.26.27-community-ubi10
    container_name: storyforge-neo4j
    restart: unless-stopped
    networks: [storyforge_net]
    ports:
      - "127.0.0.1:7474:7474"  # HTTP / Browser
      - "127.0.0.1:7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:?must be set in .env, format neo4j/PASSWORD}"
      # Accept the Neo4j EULA for the Community edition.
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      # §6.7 "no telemetry". Three things to know:
      #  - Metrics (`server.metrics.*`) are Enterprise-only — Community has no
      #    metrics subsystem, so there is nothing to disable and the old
      #    `NEO4J_server_metrics_enabled: "false"` was invalid; Community runs
      #    strict config validation and refused to boot on the unknown setting.
      #  - The two channels Community *does* ship, both default-on, are disabled
      #    below (verified against `SHOW SETTINGS` on 5.26-community): Browser/Bloom
      #    client telemetry and the usage/version "phone home" report.
      #  - `server.bolt.telemetry.enabled` already defaults false; left as-is.
      # Env mapping: a setting's "." becomes "_" and its "_" becomes "__".
      NEO4J_client_allow__telemetry: "false"        # client.allow_telemetry
      NEO4J_dbms_usage__report_enabled: "false"     # dbms.usage_report.enabled
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # The ubi10 image ships wget; HTTP 7474 returning 200 is "Neo4j is up".
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # -------------------------------------------------------------------------
  # Neo4j init — one-shot service that applies infra/neo4j/init.cypher
  # after the main neo4j service passes its healthcheck. Exits 0 on success.
  # init.cypher uses IF NOT EXISTS so re-runs are idempotent.
  # -------------------------------------------------------------------------
  neo4j-init:
    image: neo4j:5.26.27-community-ubi10
    container_name: storyforge-neo4j-init
    networks: [storyforge_net]
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:?must be set in .env, format neo4j/PASSWORD}"
    volumes:
      - ./infra/neo4j/init.cypher:/init/init.cypher:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        export NEO4J_USERNAME="$${NEO4J_AUTH%%/*}"
        export NEO4J_PASSWORD="$${NEO4J_AUTH#*/}"
        cypher-shell -a bolt://neo4j:7687 \
          -u "$$NEO4J_USERNAME" -p "$$NEO4J_PASSWORD" \
          -f /init/init.cypher
    security_opt:
      - no-new-privileges:true
    restart: "no"

  # -------------------------------------------------------------------------
  # Postgres + pgvector — relational store for document tree, edit_history, embeddings
  # -------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-trixie
    container_name: storyforge-postgres
    restart: unless-stopped
    networks: [storyforge_net]
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?must be set in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?must be set in .env}"
      POSTGRES_DB: "${POSTGRES_DB:?must be set in .env}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # `CREATE EXTENSION vector;` runs once on first data-directory init.
      - ./infra/postgres/init/01-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -------------------------------------------------------------------------
  # Ollama — local LLM server (small tier). Wrapped to run as non-root.
  # -------------------------------------------------------------------------
  ollama:
    build:
      context: ./infra/ollama
      dockerfile: Dockerfile
    image: storyforge/ollama:0.24.0-nonroot
    container_name: storyforge-ollama
    restart: unless-stopped
    networks: [storyforge_net]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/var/lib/ollama
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # `ollama list` exits 0 once the local daemon is reachable.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
