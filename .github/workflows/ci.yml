name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # Throwaway Postgres for the integration suite. The password is CI-only and
      # ephemeral (this container lives for one job); it is not a real credential.
      # Pinned to the same pgvector image the security job Trivy-scans and that
      # docker-compose runs locally.
      postgres:
        image: pgvector/pgvector:0.8.2-pg17-trixie
        env:
          POSTGRES_USER: storyforge
          POSTGRES_PASSWORD: ci_only_throwaway_pw
          POSTGRES_DB: storyforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storyforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format check)
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy
      - name: Pytest
        # The session fixture CREATEs/DROPs story_forge_test inside this server.
        env:
          TEST_DATABASE_URL: postgresql+psycopg://storyforge:ci_only_throwaway_pw@localhost:5432/story_forge_test
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: Build
        run: npm run build
      - name: Vitest
        # Component/unit tests under src/**/*.test.{ts,tsx}. Runs after Build so
        # a type error fails first with a clearer message than a vitest crash.
        run: npm test
      - name: npm audit (high/critical)
        run: npm audit --audit-level=high

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0
      - name: Secret scan against baseline
        run: detect-secrets scan --baseline .secrets.baseline
      - name: Dependency-age + non-exact-pin sweep
        # GITHUB_TOKEN lifts the GitHub API rate limit for the GitHub-release-wheel
        # age checks (spaCy models, spec §6.7) so the sweep doesn't flake on shared
        # runner IPs. The default token's read-only public scope is sufficient.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/check_dependency_age.py
      - name: OSV-Scanner — backend lockfile SCA (fail on any advisory)
        # Continuous SCA: scans backend/uv.lock against the OSV advisory DB on
        # every PR — the PyPI analogue of the frontend's `npm audit` step, and
        # the continuous complement to /add-dependency's one-shot pin-time OSV
        # check. It catches an advisory disclosed *after* a version was pinned
        # (the gap that let the starlette 1.0.0 alert reach `main` unseen — the
        # Trivy steps below scan only Docker images, nothing scanned uv.lock).
        # FAIL-ON-ANY: osv-scanner exits 1 on any unwaived advisory (spec §6.7).
        # Waivers are scoped to infra/osv/osv-scanner.toml (register: WAIVERS.md);
        # prefer a fix (bump via /add-dependency) over a waiver.
        #
        # The scanner is pinned by IMMUTABLE IMAGE DIGEST, not a tag (§6.7
        # supply-chain pinning applies to the scanner too — the gate meant to
        # catch supply-chain risk must not be one). The functional path is the
        # container, not google/osv-scanner-action: that repo's root action.yml
        # is a metadata stub with no `runs:` block, and its reusable workflows
        # do a PR *diff* scan (would miss an advisory already on `main`) or a
        # SARIF-upload recursive scan — neither is a scoped fail-on-any lockfile
        # step. v2.3.8 (released 2026-05-11) clears the 7-day scanner soak.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/backend:/src:ro" \
            -v "${{ github.workspace }}/infra/osv/osv-scanner.toml:/cfg/osv.toml:ro" \
            ghcr.io/google/osv-scanner:v2.3.8@sha256:64e86bec6df2466feea5137fc7c78fb3b7c21ec077f014d7130f64810e50676b \
            scan source -L /src/uv.lock --config=/cfg/osv.toml
      - name: docker compose config (syntax + env interpolation)
        env:
          POSTGRES_USER: cival
          POSTGRES_PASSWORD: civalpw
          POSTGRES_DB: cival
          NEO4J_AUTH: neo4j/civalpw
        run: docker compose config --quiet
      - name: Trivy scan — neo4j
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: neo4j:5.26.25-community-ubi10
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          # Waives only the 3 netty CVEs Neo4j bundles (no base variant can fix);
          # OS CVEs are not waived — the UBI-10 base is clean. See the file for
          # the per-CVE justification. Scoped to this step only.
          trivyignores: infra/trivy/neo4j.trivyignore
      - name: Trivy scan — pgvector
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pgvector/pgvector:0.8.2-pg17-trixie
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          # Waives residual Debian OS CVEs (no fresher pgvector rebuild exists
          # yet) and the bundled gosu/Go-stdlib CVEs, each with a per-CVE RCE
          # assessment. See the file for justification. Scoped to this step only.
          trivyignores: infra/trivy/pgvector.trivyignore
      - name: Trivy scan — ollama (upstream base for our wrapper)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ollama/ollama:0.24.0
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          # Waives compiled-in Go-stdlib CVEs in the ollama binary that no tag
          # can fix (they need an upstream rebuild on a patched Go toolchain),
          # each with a per-CVE reachability note. Scoped to this step only.
          trivyignores: infra/trivy/ollama.trivyignore

  ollama-cloud-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Cloud-tier reachability smoke test
        # Script exits 0 when the secret is unset (forks, missing key) — CI passes.
        env:
          OLLAMA_CLOUD_API_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
        run: python3 scripts/check_ollama_cloud.py
