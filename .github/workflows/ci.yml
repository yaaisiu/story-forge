name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Daily full dependency/image scan, independent of PR cadence. Because the heavy jobs
  # below are path-scoped to code-bearing changes (see the `changes` job), a stretch of
  # docs-only PRs would otherwise leave newly-disclosed advisories against unchanged
  # dependencies (the CVE-treadmill) uncaught until the next code PR. The schedule closes
  # that gap — the `security` job force-runs here. (Spec §6.7 "CI scan cadence".)
  schedule:
    - cron: "17 4 * * *" # 04:17 UTC, off the top-of-hour congestion GitHub warns about
  # Manual "run everything now" button (treated as a full run, like a code change).
  workflow_dispatch:

# Cancel a superseded run when a PR branch is pushed again; never cancel a main/schedule
# run (each commit on main is verified to completion).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Decide whether this push/PR touches CODE. The heavy jobs (service-container
  # test suites, the frontend build, the dependency/image scans) only need to run
  # when something outside the docs surface changed. A docs-only change (docs/**,
  # architecture/**, or any *.md) touches no dependency, image, or code, so those
  # scans have nothing to catch. The always-on `secret-scan` job below still runs
  # on every push/PR regardless. Native git-diff — no third-party action to pin.
  # (Spec §6.7 "CI scan cadence".)
  # ───────────────────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so the base..head diff is computable
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # schedule → scans only (security forces itself on via its own `if`);
          # workflow_dispatch → a full manual run.
          if [ "$EVENT" = "schedule" ]; then echo "code=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [ "$EVENT" = "workflow_dispatch" ]; then echo "code=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [ "$EVENT" = "pull_request" ]; then base="$BASE_SHA"; else base="$BEFORE_SHA"; fi
          # New branch / unknown base (all-zero SHA) → can't diff, run everything (safe default).
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Three-dot: changes on HEAD since it diverged from base (the PR's own files).
          changed="$(git diff --name-only "$base...$HEAD_SHA")"
          # "Docs" = anything under docs/ or architecture/, or any *.md anywhere. Everything
          # else (backend/, frontend/, pyproject.toml, package.json, docker-compose.yml,
          # infra/, .github/, lockfiles, scripts/, …) is code-bearing.
          code_changed="$(printf '%s\n' "$changed" | grep -vE '(^|/)[^/]*\.md$|^docs/|^architecture/' || true)"
          if [ -n "$code_changed" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # Always-on, on every push/PR (docs included) and on the schedule. Cheap, and the one
  # security gate a docs-only change can still trip (a secret pasted into a markdown file).
  # Split out of the heavier `security` job so it is never path-skipped. (Spec §6.7.)
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0
      - name: Secret scan against baseline
        run: detect-secrets scan --baseline .secrets.baseline

  backend:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # Throwaway Postgres for the integration suite. The password is CI-only and
      # ephemeral (this container lives for one job); it is not a real credential.
      # Pinned to the same pgvector image the security job Trivy-scans and that
      # docker-compose runs locally.
      postgres:
        image: pgvector/pgvector:0.8.2-pg17-trixie
        env:
          POSTGRES_USER: storyforge
          POSTGRES_PASSWORD: ci_only_throwaway_pw
          POSTGRES_DB: storyforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storyforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Throwaway Neo4j for the graph integration suite (M2.S4). Same image the
      # security job Trivy-scans and docker-compose runs. The password is CI-only.
      # Telemetry is disabled to match the §6.7 compose config (and the metrics
      # setting that crash-looped Community is deliberately absent — see compose).
      neo4j:
        image: neo4j:5.26.25-community-ubi10
        env:
          NEO4J_AUTH: neo4j/ci_only_throwaway_pw
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
          NEO4J_client_allow__telemetry: "false"
          NEO4J_dbms_usage__report_enabled: "false"
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget --quiet --tries=1 --spider http://localhost:7474/ || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true # cache the uv download + resolved wheels (keyed on uv.lock)
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format check)
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy
      - name: Pytest
        # The session fixture CREATEs/DROPs story_forge_test inside this server.
        # Neo4j integration tests scope writes to a fresh project_id per test and
        # DETACH-DELETE them on teardown (Community has no throwaway-DB equivalent).
        env:
          TEST_DATABASE_URL: postgresql+psycopg://storyforge:ci_only_throwaway_pw@localhost:5432/story_forge_test
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ci_only_throwaway_pw
        run: uv run pytest -q

  frontend:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: Build
        run: npm run build
      - name: Vitest
        # Component/unit tests under src/**/*.test.{ts,tsx}. Runs after Build so
        # a type error fails first with a clearer message than a vitest crash.
        run: npm test
      - name: npm audit (high/critical, shipped deps)
        # --omit=dev: audit only what ships in the SPA bundle, not the build/test
        # toolchain (jsdom, vitest, eslint, …). A dev-only advisory can't reach a
        # user, so it shouldn't red main on un-shipped code (spec §6.7, 2026-06-18).
        run: npm audit --omit=dev --audit-level=high

  # Dependency-age + advisory (OSV) + image (Trivy) scans. Path-scoped to code-bearing
  # changes (a docs-only PR changes no deps/images), and force-run on the daily schedule
  # so the CVE-treadmill is caught regardless of PR cadence. The detect-secrets step that
  # used to live here is now the always-on `secret-scan` job above. (Spec §6.7.)
  security:
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Dependency-age + non-exact-pin sweep
        # GITHUB_TOKEN lifts the GitHub API rate limit for the GitHub-release-wheel
        # age checks (spaCy models, spec §6.7) so the sweep doesn't flake on shared
        # runner IPs. The default token's read-only public scope is sufficient.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/check_dependency_age.py
      - name: OSV-Scanner — backend lockfile SCA (fail on any advisory)
        # Continuous SCA: scans backend/uv.lock against the OSV advisory DB on
        # every code-bearing PR + daily — the PyPI analogue of the frontend's
        # `npm audit` step, and the continuous complement to /add-dependency's
        # one-shot pin-time OSV check. It catches an advisory disclosed *after* a
        # version was pinned (the gap that let the starlette 1.0.0 alert reach
        # `main` unseen — the Trivy steps below scan only Docker images, nothing
        # scanned uv.lock).
        # FAIL-ON-ANY: osv-scanner exits 1 on any unwaived advisory (spec §6.7).
        # Waivers are scoped to infra/osv/osv-scanner.toml (register: WAIVERS.md);
        # prefer a fix (bump via /add-dependency) over a waiver.
        #
        # The scanner is pinned by IMMUTABLE IMAGE DIGEST, not a tag (§6.7
        # supply-chain pinning applies to the scanner too — the gate meant to
        # catch supply-chain risk must not be one). The functional path is the
        # container, not google/osv-scanner-action: that repo's root action.yml
        # is a metadata stub with no `runs:` block, and its reusable workflows
        # do a PR *diff* scan (would miss an advisory already on `main`) or a
        # SARIF-upload recursive scan — neither is a scoped fail-on-any lockfile
        # step. v2.3.8 (released 2026-05-11) clears the 7-day scanner soak.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/backend:/src:ro" \
            -v "${{ github.workspace }}/infra/osv/osv-scanner.toml:/cfg/osv.toml:ro" \
            ghcr.io/google/osv-scanner:v2.3.8@sha256:64e86bec6df2466feea5137fc7c78fb3b7c21ec077f014d7130f64810e50676b \
            scan source -L /src/uv.lock --config=/cfg/osv.toml
      - name: docker compose config (syntax + env interpolation)
        env:
          POSTGRES_USER: cival
          POSTGRES_PASSWORD: civalpw
          POSTGRES_DB: cival
          NEO4J_AUTH: neo4j/civalpw
        run: docker compose config --quiet
      - name: Trivy scan — neo4j
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: neo4j:5.26.25-community-ubi10
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          # Waives only the 3 netty CVEs Neo4j bundles (no base variant can fix);
          # OS CVEs are not waived — the UBI-10 base is clean. See the file for
          # the per-CVE justification. Scoped to this step only.
          trivyignores: infra/trivy/neo4j.trivyignore
      - name: Trivy scan — pgvector
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pgvector/pgvector:0.8.2-pg17-trixie
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          # Waives residual Debian OS CVEs (no fresher pgvector rebuild exists
          # yet) and the bundled gosu/Go-stdlib CVEs, each with a per-CVE RCE
          # assessment. See the file for justification. Scoped to this step only.
          trivyignores: infra/trivy/pgvector.trivyignore
      - name: Trivy scan — ollama (upstream base for our wrapper)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ollama/ollama:0.24.0
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          # Waives compiled-in Go-stdlib CVEs in the ollama binary that no tag
          # can fix (they need an upstream rebuild on a patched Go toolchain),
          # each with a per-CVE reachability note. Scoped to this step only.
          trivyignores: infra/trivy/ollama.trivyignore

  ollama-cloud-smoke:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Cloud-tier reachability smoke test
        # Script exits 0 when the secret is unset (forks, missing key) — CI passes.
        env:
          OLLAMA_CLOUD_API_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
        run: python3 scripts/check_ollama_cloud.py
