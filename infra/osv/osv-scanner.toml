# OSV-Scanner waivers — backend Python lockfile (backend/uv.lock) ONLY.
#
# This is the ENFORCED waiver home: the SCA gate in .github/workflows/ci.yml
# reads it via `--config=infra/osv/osv-scanner.toml`, scoped to the one
# osv-scanner step (spec §6.7 keeps waivers scoped, never repo-wide — the same
# discipline as the per-image infra/trivy/*.trivyignore files).
#
# The gate is FAIL-ON-ANY: any unwaived advisory in backend/uv.lock reds CI.
# Prefer a FIX (bump to the fixed version via /add-dependency, soak-checked)
# over a waiver. Waive only an assessed, unreachable, or unfixable advisory,
# and record the full rationale in the human register infra/osv/WAIVERS.md
# (this file carries the machine-read entry; that file carries the "why" +
# the "drop when" condition). The two must mirror each other — /review-pr §5
# checks the attribution.
#
# To waive an assessed advisory, add an [[IgnoredVulns]] block (template):
#
#   [[IgnoredVulns]]
#   id = "GHSA-xxxx-xxxx-xxxx"   # the OSV/GHSA/PYSEC id (aliases are ignored too)
#   # ignoreUntil = 2026-12-31   # optional hard-date backstop; we default to
#                                # condition-based expiry (see WAIVERS.md)
#   reason = "one line; full reachability + 'drop when' lives in WAIVERS.md"

# torch.jit.script memory corruption (M3.S2). Affects all torch ≤2.12.0 with NO
# fixed version; unreachable here — the embedding stack calls inference-only
# `encode`, never `torch.jit.script`. Full reachability + drop-when in WAIVERS.md.
[[IgnoredVulns]]
id = "GHSA-rrmf-rvhw-rf47"   # CVE-2025-3000 / PYSEC-2025-194 / BIT-pytorch-2025-3000 (MEDIUM, CVSS 5.3)
reason = "torch.jit.script memory corruption; unreachable (inference-only encode), no fix — see infra/osv/WAIVERS.md"

# setuptools sdist MANIFEST.in Unicode-normalization bypass (transitive via
# spacy/thinc/torch). Fixed in 83.0.0 (pub 2026-07-04, now soaked) — but the drop is
# BLOCKED by torch==2.12.0, which caps setuptools<82; only torch 2.13.0 relaxes that
# (setuptools>=77.0.3, no cap), and 2.13.0 (pub 2026-07-08) clears its OWN 14-day soak
# on 2026-07-23. So this extends to that floor: drop then via a combined torch 2.13.0 +
# setuptools 83.0.0 bump. Unreachable — we never build a source distribution, and the
# bug is macOS-APFS/HFS+ only. Full rationale in WAIVERS.md.
[[IgnoredVulns]]
id = "GHSA-h35f-9h28-mq5c"   # CVE-2026-59890 / PYSEC-2026-3447 (MEDIUM, CVSS 6.1)
ignoreUntil = 2026-07-23     # floor = torch 2.13.0 pub 2026-07-08 + 15d (torch relaxes setuptools<82); re-reds to force the drop
reason = "setuptools sdist MANIFEST.in NFD/NFC exclude bypass (macOS-only); unreachable (we build no sdist); fix 83.0.0 soaked but blocked by torch==2.12.0 (setuptools<82) until torch 2.13.0 soaks 2026-07-23 — see infra/osv/WAIVERS.md"
